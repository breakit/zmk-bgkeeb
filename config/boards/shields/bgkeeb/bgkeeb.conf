# Uncomment to enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_HID_CONSUMER_REPORT_USAGES_BASIC=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Give the keyboard an explicit name Windows can look up
CONFIG_ZMK_KEYBOARD_NAME="BGKeeB Wireless"
CONFIG_ZMK_SLEEP=y

CONFIG_ZMK_SPLIT=y
